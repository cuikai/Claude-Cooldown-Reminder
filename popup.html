<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title data-i18n="popupTitle">Claude Cooldown Reminder</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="hdr">
    <div class="brand-text">
      <h1 data-i18n="popupTitle">Claude Cooldown Reminder</h1>
      <p class="sub">
        <span id="subtitle" data-i18n="popupSubtitle">We'll ping you the moment your quota refills.</span>
        <button id="btn-test" class="test-btn" type="button">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9" />
            <path d="M13.7 21a2 2 0 0 1-3.4 0" />
          </svg>
        </button>
      </p>
    </div>
  </header>

  <main>
    <section id="status-card" class="card status idle">
      <div class="status-line">
        <span class="dot" aria-hidden="true"></span>
        <span id="status-label" data-i18n="statusIdle">Not watching</span>
        <span class="cd-inline" id="cd-inline" hidden>
          <svg class="cd-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M6 2h12M6 22h12" />
            <path d="M6 2c0 5 6 5 6 10 0-5 6-5 6-10M6 22c0-5 6-5 6-10 0 5 6 5 6 10" />
          </svg>
          <span class="cd-time" id="cd-time">0秒</span>
        </span>
      </div>
      <div class="empty-hint" id="empty-hint" data-i18n="statusNoData" hidden>
        Waiting for usage data…
      </div>
      <div id="windows-list" class="windows-list" hidden></div>
    </section>

    <section class="card">
      <div class="usage-hdr">
        <h2 data-i18n="usageSectionTitle">Usage limits</h2>
        <button id="btn-usage-refresh" class="link" data-i18n="btnUsageRefresh">Refresh</button>
      </div>
      <div id="usage-list" class="usage-list" hidden></div>
      <div id="usage-note" class="usage-note" data-i18n="usageLoading">Loading usage…</div>
      <div id="usage-updated" class="usage-updated" hidden></div>
    </section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
